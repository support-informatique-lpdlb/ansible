---
# Collections Ansible pour piloter les OmniSwitch AOS 8.
# Installation :  ansible-galaxy collection install -r requirements.yml -p collections
#
# ale.aos8 (collection officielle ALE) N'EST PAS sur la Galaxy publique : elle
# s'installe depuis l'archive des releases GitHub (v1.0.2 = dernière stable).
collections:
  - name: https://github.com/ale-nsa-team/ale.aos8/releases/download/v1.0.2/ale-aos8-1.0.2.tar.gz

  - name: ansible.netcommon
    version: ">=5.0.0"

  - name: ansible.utils
    version: ">=2.0.0"
