---
# Collections Ansible (Ansible Galaxy) pour piloter les OmniSwitch AOS 8.
# Installation :  ansible-galaxy collection install -r requirements.yml -p collections
#
# ale.aos8 = collection officielle ALE : aos8_config (idempotent), aos8_vlans,
# aos8_l2_interfaces, aos8_facts, aos8_command...
collections:
  - name: ale.aos8
    version: ">=1.0.0"

  - name: ansible.netcommon
    version: ">=5.0.0"

  - name: ansible.utils
    version: ">=2.0.0"
