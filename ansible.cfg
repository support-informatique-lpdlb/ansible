[defaults]
# Inventaire = le répertoire inventories/ (parcourt tous les sites + group_vars)
inventory            = inventories
roles_path           = roles
collections_path     = collections
host_key_checking    = False
retry_files_enabled  = False
# Callback par défaut. Pour une sortie YAML plus lisible, installer
# community.general puis mettre : stdout_callback = community.general.yaml
# stdout_callback    = community.general.yaml
gathering            = explicit
interpreter_python   = auto_silent
timeout              = 60
forks                = 20
# Masque les warnings de dépréciation émis par la collection ale.aos8
# (code vendeur écrit pour un ansible-core plus ancien ; notre code, lui, est à jour).
deprecation_warnings = False

# Décommenter pour ne plus saisir le mot de passe vault à chaque exécution.
# Le fichier .vault_pass doit contenir le mot de passe en clair et rester
# hors du dépôt (déjà présent dans .gitignore).
# vault_password_file = .vault_pass

[persistent_connection]
command_timeout = 120
connect_timeout = 60
# Force paramiko (auth par mot de passe) : évite que libssh tente une clé
# publique et échoue sur les switchs AOS 8.
ssh_type = paramiko

[paramiko_connection]
look_for_keys = False
