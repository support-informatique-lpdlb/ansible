---
# Onboarding d'un switch OmniSwitch AOS 8.
# Envoie les commandes de config en SSH via aos8_command.
#
# Pourquoi PAS aos8_config sur cette collection :
#  - il applique même en --check (load_config non protégé par check_mode) : DANGEREUX
#  - son diff ne matche pas le format de "show configuration snapshot" -> réapplique tout
# aos8_command respecte --check (n'exécute pas les commandes de config) :
#  - --check = vrai dry-run sûr (montre seulement les commandes)
#  - un run réel (ré)applique tout ; sur AOS c'est sans danger (les commandes
#    re-nomment/re-déclarent simplement)
#
# TOUJOURS cibler un switch avec --limit :
#   ansible-playbook playbooks/onboard.yml --limit LAB_TEST_01 --check --ask-vault-pass
#   ansible-playbook playbooks/onboard.yml --limit LAB_TEST_01 --ask-vault-pass
- name: Onboarding switch OmniSwitch AOS 8
  hosts: aos8
  gather_facts: false
  vars:
    onboard_reload: false   # true = reload du switch en fin de run (coupe la session)
  tasks:
    - name: "Construire la liste des commandes depuis le template"
      ansible.builtin.set_fact:
        onboard_commands: >-
          {{ lookup('template', playbook_dir ~ '/../templates/onboard.cfg.j2').splitlines()
             | map('trim') | select() | reject('match', '^!') | list }}

    - name: "Aperçu des commandes (dry-run, mots de passe masqués)"
      ansible.builtin.debug:
        msg: "{{ onboard_commands | map('regex_replace', '(password )\\S+', '\\1***') | list }}"

    - name: "Envoyer les commandes d'onboarding en SSH"
      ale.aos8.aos8_command:
        commands: "{{ onboard_commands }}"
      when: not ansible_check_mode
      no_log: true            # les commandes contiennent des mots de passe

    - name: "Sauvegarder + certifier"
      ale.aos8.aos8_command:
        commands:
          - write memory flash-synchro
          - copy running certified
      when: not ansible_check_mode

    - name: "Recharger le switch (optionnel)"
      ale.aos8.aos8_command:
        commands:
          - reload from working no rollback-timeout
      when: onboard_reload | bool and not ansible_check_mode
