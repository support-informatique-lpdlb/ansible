#   --limit ROU_SW_ACCESS_02 -> un seul switch
all:
  children:
    aos8:
      children:
        ROU:
          hosts:
            LAB_TEST_01:
              ansible_host: 10.2.121.111
            ROU_SW_CDR_01:
              ansible_host: 10.2.121.100
            ROU_SW_ACCESS_01:
              ansible_host: 10.2.121.101
            ROU_SW_ACCESS_02:
              ansible_host: 10.2.121.102
            ROU_SW_ACCESS_03:
              ansible_host: 10.2.121.103
