  - { vlan_id: 20,  name: IMPRIMANTES,        admin_state: enable }
  - { vlan_id: 30,  name: EQUIPEMENT,         admin_state: enable }
  - { vlan_id: 31,  name: EQUIPEMENT_WIFI,    admin_state: enable }
  - { vlan_id: 40,  name: ORDIS_INFOS,        admin_state: enable }
  - { vlan_id: 41,  name: IT,                 admin_state: enable }
  - { vlan_id: 42,  name: RHTH,               admin_state: enable }
  - { vlan_id: 43,  name: QHSE,               admin_state: enable }
  - { vlan_id: 44,  name: DIRECTION,          admin_state: enable }
  - { vlan_id: 45,  name: COMPTABILITE,       admin_state: enable }
